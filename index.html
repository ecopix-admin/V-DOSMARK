<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ecopix Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #ffcc00; --bg: #000; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; }

        /* Full Screen Feed */
        .feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .post { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Header UI */
        header { position: fixed; top: 0; width: 100%; z-index: 10; display: flex; justify-content: space-between; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .search-box { flex: 1; margin: 0 15px; background: var(--glass); border-radius: 20px; padding: 8px 15px; backdrop-filter: blur(10px); }
        .search-box input { background: none; border: none; color: #fff; width: 100%; outline: none; }

        /* Right Side Actions */
        .actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 5; }
        .action-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .action-btn i { font-size: 32px; margin-bottom: 5px; }
        .action-btn span { font-size: 12px; font-weight: 500; }
        .fa-whatsapp { color: #25D366; }

        /* Bottom Info */
        .bottom-info { position: absolute; bottom: 100px; left: 15px; right: 80px; z-index: 5; pointer-events: none; }
        .bottom-info * { pointer-events: auto; }
        .shop-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .post-desc { font-size: 14px; opacity: 0.9; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-tag { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 5px; font-weight: 800; display: inline-block; }

        /* Bottom Navbar */
        nav { position: fixed; bottom: 0; width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); background: #000; border-top: 1px solid #222; padding: 15px 0; z-index: 100; }
        .nav-link { text-align: center; font-size: 22px; color: #777; transition: 0.3s; }
        .nav-link.active { color: var(--accent); }

        /* Modern Modals */
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; padding: 25px; overflow-y: auto; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { font-size: 30px; float: right; margin-bottom: 20px; }

        input, textarea { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; }
        .submit-btn { background: var(--accent); color: #000; border: none; width: 100%; padding: 18px; font-weight: 900; border-radius: 12px; margin-top: 20px; letter-spacing: 1px; }

        /* Profile Style */
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; margin-top: 20px; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; }
        .grid-item img, .grid-item video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <header>
        <i class="fas fa-bars" onclick="openMod('menuMod')"></i>
        <div class="search-box">
            <input type="text" placeholder="Axtarış..." id="searchQuery">
        </div>
        <i class="fas fa-user-circle" style="font-size: 24px;" onclick="openProfile()"></i>
    </header>

    <div class="feed" id="feed">
        </div>

    <nav>
        <div class="nav-link active" onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div class="nav-link" onclick="openMod('addMod')"><i class="fas fa-plus-circle"></i></div>
        <div class="nav-link" onclick="openMod('favMod')"><i class="fas fa-heart"></i></div>
        <div class="nav-link" onclick="openProfile()"><i class="fas fa-store"></i></div>
    </nav>

    <div id="addMod" class="modal">
        <span class="close-modal" onclick="closeMod('addMod')">&times;</span>
        <h2 style="text-align: center;">Yeni Elan</h2>
        <input type="text" id="t" placeholder="Məhsulun adı">
        <input type="number" id="p" placeholder="Qiymət (AZN)">
        <input type="text" id="s" placeholder="Mağaza adı">
        <textarea id="d" rows="4" placeholder="Ətraflı məlumat..."></textarea>
        <input type="tel" id="ph" placeholder="WhatsApp (994XXXXXXXXX)">
        
        <label style="display: block; padding: 30px; border: 2px dashed #333; border-radius: 15px; text-align: center; margin-top: 10px;">
            <input type="file" id="m" multiple accept="video/*,image/*" style="display:none" onchange="countF()">
            <i class="fas fa-video" style="font-size: 30px;"></i>
            <p id="fc">Video və ya 10 Şəkil seç</p>
        </label>
        
        <button class="submit-btn" onclick="goUpload()">PAYLAŞMAĞA BAŞLA</button>
    </div>

    <div id="profMod" class="modal">
        <span class="close-modal" onclick="closeMod('profMod')">&times;</span>
        <div style="text-align:center; padding-top: 30px;">
            <div style="width: 80px; height: 80px; background: var(--accent); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: #000; font-size: 30px; font-weight: bold;" id="pInit">S</div>
            <h2 id="pName">Mağaza Adı</h2>
            <div id="pStats" style="opacity: 0.6; font-size: 14px;">0 Elan</div>
        </div>
        <div class="profile-grid" id="pGrid"></div>
    </div>

    <script>
        const API = {
            url: "https://agzlaqejhbktrpixpvry.supabase.co",
            key: "sb_publishable_eWD86TA_7zPKqZi6pmrzgA_4YZt4XQO",
            bot: "8799012820:AAEfmCWtpvSmCgAZrxH8b03mwfdV9uS6zeE",
            chat: "@vidosmarkarxiv",
            worker: "https://red-butterfly-8a1f.samohasan777.workers.dev"
        };

        const sb = supabase.createClient(API.url, API.key);

        // TikTok Video Səs/Pauza Məntiqi
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                const v = e.target.querySelector('video');
                if (v) {
                    if (e.isIntersecting) {
                        v.play().catch(() => {});
                        v.muted = false;
                    } else {
                        v.pause();
                        v.currentTime = 0;
                    }
                }
            });
        }, { threshold: 0.8 });

        async function load() {
            const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return;

            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'post';
                div.innerHTML = `
                    <video src="${item.media_url}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="actions">
                        <div class="action-btn" onclick="openProfile('${item.shop_name}')"><i class="fas fa-user-circle"></i><span>Profil</span></div>
                        <div class="action-btn"><i class="fas fa-heart"></i><span>${item.likes || 0}</span></div>
                        <div class="action-btn" onclick="window.open('https://wa.me/${item.phone}')"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></div>
                        <div class="action-btn" onclick="window.open('tel:${item.phone}')"><i class="fas fa-phone"></i><span>Zəng</span></div>
                    </div>
                    <div class="bottom-info">
                        <div class="shop-name" onclick="openProfile('${item.shop_name}')">@${item.shop_name} <i class="fas fa-check-circle" style="color:#00f2ea; font-size:14px;"></i></div>
                        <div class="post-desc">${item.title} - ${item.description}</div>
                        <div class="price-tag">${item.price} AZN</div>
                    </div>
                `;
                feed.appendChild(div);
                observer.observe(div);
            });
        }

        async function goUpload() {
            const file = document.getElementById('m').files[0];
            if (!file) return alert("Fayl seçin!");

            const info = {
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                s: document.getElementById('s').value,
                ph: document.getElementById('ph').value,
                d: document.getElementById('d').value
            };

            try {
                // Telegrama göndər
                const msg = `🆕 *YENİ ELAN*\n\n💎 Məhsul: ${info.t}\n💰 Qiymət: ${info.p} AZN\n🏠 Mağaza: ${info.s}\n📞 Əlaqə: ${info.ph}`;
                fetch(`https://api.telegram.org/bot${API.bot}/sendMessage?chat_id=${API.chat}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);

                const fd = new FormData();
                fd.append('file', file);
                fd.append('title', info.t);
                fd.append('price', info.p);
                fd.append('shop_name', info.s);
                fd.append('phone', info.ph);
                fd.append('description', info.d);

                const res = await fetch(`${API.worker}/upload`, { method: 'POST', body: fd });
                
                if (res.ok) {
                    alert("Uğurla paylaşıldı!");
                    location.reload();
                } else {
                    alert("Server xətası! (Worker)");
                }
            } catch (err) {
                alert("Xəta: Failed to fetch. Bağlantınızı yoxlayın.");
            }
        }

        function openMod(id) { document.getElementById(id).style.display = 'block'; }
        function closeMod(id) { document.getElementById(id).style.display = 'none'; }
        function countF() { document.getElementById('fc').innerText = document.getElementById('m').files.length + " fayl seçildi"; }

        async function openProfile(name) {
            const n = name || "Mənim Mağazam";
            document.getElementById('pName').innerText = n;
            document.getElementById('pInit').innerText = n[0].toUpperCase();
            openMod('profMod');
            
            // Profil şəbəkəsini yüklə
            const { data } = await sb.from('posts').select('*').eq('shop_name', n);
            const grid = document.getElementById('pGrid');
            grid.innerHTML = '';
            data?.forEach(p => {
                grid.innerHTML += `<div class="grid-item"><video src="${p.media_url}"></video></div>`;
            });
            document.getElementById('pStats').innerText = (data?.length || 0) + " Elan";
        }

        window.onload = load;
    </script>
</body>
</html>
