<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VidosMark Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #gridView, #favView { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; height: 100vh; overflow-y: auto; padding: 130px 0 100px 0; }
        .grid-item { aspect-ratio: 1/1; background: #111; position: relative; overflow: hidden; }
        .grid-item video, .grid-item img { width: 100%; height: 100%; object-fit: cover; }
        .grid-price { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px 5px; border-radius: 4px; color: #fbbf24; font-weight: bold; }
        #feedView { display: none; height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .snap-section { height: 100vh; scroll-snap-align: start; position: relative; background: #000; }
        .media-holder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .feed-media { width: 100%; height: 100%; object-fit: contain; }
        .side-bar { position: absolute; right: 12px; bottom: 180px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1); }
        .desc-panel { position: absolute; bottom: 130px; left: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 60; }
        .desc-content { display: none; background: #0a0a0a; padding: 25px; border-radius: 25px; border: 1px solid #fbbf24; position: fixed; bottom: 100px; left: 5%; width: 90%; z-index: 1000; max-height: 50vh; overflow-y: auto; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 85px; background: #000; border-top: 0.5px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 200; padding-bottom: 20px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; font-size: 10px; font-weight: bold; }
        .nav-item.active { color: white; }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 500; padding: 25px; overflow-y: auto; }
        #loader { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); z-index:1000; background:black; padding:30px; border-radius:20px; text-align:center; border: 1px solid #fbbf24; }
        .search-container { position: fixed; top: 75px; left: 0; width: 100%; padding: 10px 20px; z-index: 140; background: black; display: none; }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin text-4xl text-yellow-500 mb-2"></i><p>YÜKLƏNİR...</p></div>

    <div class="fixed top-0 w-full p-5 flex justify-between items-center z-[150] bg-black">
        <h1 class="text-2xl font-black italic text-yellow-500" onclick="location.reload()">VIDOSMARK</h1>
        <div class="flex gap-6 items-center">
            <i class="fas fa-search text-xl" onclick="toggleSearchUI()"></i>
        </div>
    </div>

    <div id="searchUI" class="search-container">
        <input type="text" id="searchInput" oninput="filterAds()" placeholder="Axtarış..." class="w-full bg-zinc-900 border border-yellow-500 p-3 rounded-xl text-white outline-none">
    </div>

    <div id="gridView"></div>
    <div id="favView" class="hidden"></div>
    <div id="feedView"></div>

    <div id="uploadModal" class="modal">
        <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-black">YENİ ELAN</h2><span onclick="closeModal('uploadModal')" class="text-3xl">&times;</span></div>
        <div class="space-y-4">
            <input type="text" id="adMarka" placeholder="Model" class="w-full bg-zinc-900 p-4 rounded-xl">
            <input type="number" id="adPrice" placeholder="Qiymət (AZN)" class="w-full bg-zinc-900 p-4 rounded-xl">
            <textarea id="adDesc" placeholder="Ətraflı məlumat..." class="w-full bg-zinc-900 p-4 rounded-xl h-24"></textarea>
            <input type="text" id="adPhone" placeholder="Mobil nömrə" class="w-full bg-zinc-900 p-4 rounded-xl">
            <div class="border-2 border-dashed border-yellow-500 p-6 rounded-2xl text-center" onclick="document.getElementById('mediaInput').click()">
                <i class="fas fa-camera text-2xl mb-2"></i>
                <p id="fileStatus" class="text-xs">1 VİDEO VƏ YA 10 ŞƏKİL</p>
                <input type="file" id="mediaInput" accept="video/*,image/*" multiple class="hidden" onchange="updateStatus()">
            </div>
            <button onclick="handleUpload()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black">PAYLAŞ</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" id="btn-home" onclick="showView('gridView')"><i class="fas fa-home text-2xl"></i><span>ANA SƏHİFƏ</span></div>
        <div class="nav-item" onclick="openModal('uploadModal')"><div class="bg-yellow-500 text-black w-14 h-10 rounded-xl flex items-center justify-center text-xl"><i class="fas fa-plus"></i></div></div>
        <div class="nav-item" id="btn-fav" onclick="showView('favView')"><i class="fas fa-heart text-2xl"></i><span>SEVİMLİLƏR</span></div>
    </div>

    <script>
        const SUPA_URL = "https://dpdrejpbnbbfwusqudxq.supabase.co";
        const SUPA_KEY = "sb_publishable_qOtB3HU91l0eQY8qaq0PDw_jzyO9Pze";
        const WORKER_URL = "https://red-butterfly-8a1f.samohasan777.workers.dev";
        const supabaseClient = supabase.createClient(SUPA_URL, SUPA_KEY);
        let allAds = [];
        let favs = JSON.parse(localStorage.getItem('vmark_favs')) || [];

        function updateStatus() {
            const files = document.getElementById('mediaInput').files;
            document.getElementById('fileStatus').innerText = files.length + " fayl seçildi";
        }

        async function loadAds() {
            const { data } = await supabaseClient.from('elanlar').select('*').order('created_at', { ascending: false });
            allAds = data || [];
            renderGrid('gridView', allAds);
        }

        function renderGrid(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = list.map(ad => `
                <div class="grid-item" onclick="openFeed('${ad.id}')">
                    ${ad.media_url.includes('mp4') || ad.media_url.includes('video') ? `<video src="${ad.media_url}" muted></video>` : `<img src="${ad.media_url}">`}
                    <div class="grid-price">${ad.price} AZN</div>
                </div>`).join('');
        }

        async function handleUpload() {
            const files = document.getElementById('mediaInput').files;
            if(!files.length) return alert("Fayl seçin!");
            document.getElementById('loader').style.display = 'block';
            
            const file = files[0];
            const isVideo = file.type.startsWith('video');
            const formData = new FormData();
            formData.append('chat_id', "@vidosmarkarxiv");
            formData.append(isVideo ? 'video' : 'photo', file);

            try {
                const res = await fetch(`https://api.telegram.org/bot8799012820:AAEfmCWtpvSmCgAZrxH8b03mwfdV9uS6zeE/${isVideo ? 'sendVideo' : 'sendPhoto'}`, { method: 'POST', body: formData });
                const tg = await res.json();
                if(tg.ok) {
                    const fId = isVideo ? tg.result.video.file_id : tg.result.photo[tg.result.photo.length-1].file_id;
                    const { error } = await supabaseClient.from('elanlar').insert([{
                        marka: document.getElementById('adMarka').value,
                        price: document.getElementById('adPrice').value,
                        description: document.getElementById('adDesc').value,
                        phone: document.getElementById('adPhone').value,
                        media_url: `${WORKER_URL}/?file_id=${fId}`,
                        user_id: "user_" + Date.now()
                    }]);
                    if(!error) location.reload();
                    else alert(error.message);
                }
            } catch (e) { alert(e.message); }
            finally { document.getElementById('loader').style.display = 'none'; }
        }

        function openFeed(id) {
            document.getElementById('gridView').style.display = 'none';
            const feed = document.getElementById('feedView');
            feed.style.display = 'block';
            feed.innerHTML = allAds.map(ad => `
                <div class="snap-section" id="post-${ad.id}">
                    <div class="media-holder">
                        ${ad.media_url.includes('mp4') || ad.media_url.includes('video') ? `<video class="feed-media" src="${ad.media_url}" loop autoplay muted playsinline></video>` : `<img class="feed-media" src="${ad.media_url}">`}
                    </div>
                    <div class="side-bar">
                        <div class="action-btn" onclick="toggleFav('${ad.id}')"><i class="fas fa-heart ${favs.includes(ad.id.toString()) ? 'text-red-500' : ''}"></i></div>
                        <a href="tel:${ad.phone}" class="action-btn text-blue-400"><i class="fas fa-phone"></i></a>
                    </div>
                    <div class="desc-panel">
                        <p class="text-yellow-500 font-black text-3xl">${ad.price} AZN</p>
                        <p class="font-bold uppercase">${ad.marka}</p>
                        <button onclick="document.getElementById('dc-${ad.id}').style.display='block'" class="mt-2 bg-white/20 p-2 rounded-lg text-xs font-bold">DETALLAR</button>
                    </div>
                    <div id="dc-${ad.id}" class="desc-content">
                        <p class="text-sm">${ad.description}</p>
                        <button onclick="this.parentElement.style.display='none'" class="w-full mt-4 bg-yellow-500 text-black py-2 rounded-lg">BAĞLA</button>
                    </div>
                </div>`).join('');
            document.getElementById(`post-${id}`).scrollIntoView();
        }

        function toggleSearchUI() {
            const s = document.getElementById('searchUI');
            s.style.display = s.style.display === 'block' ? 'none' : 'block';
        }

        function filterAds() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderGrid('gridView', allAds.filter(a => a.marka.toLowerCase().includes(val) || a.price.toString().includes(val)));
        }

        function showView(v) {
            document.getElementById('gridView').style.display = v === 'gridView' ? 'grid' : 'none';
            document.getElementById('favView').style.display = v === 'favView' ? 'grid' : 'none';
            document.getElementById('feedView').style.display = 'none';
            if(v === 'favView') renderGrid('favView', allAds.filter(a => favs.includes(a.id.toString())));
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onload = loadAds;
    </script>
</body>
</html>
