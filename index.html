<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIDOSMARK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Header */
        .header {
            position: fixed; top: 0; width: 100%; display: flex; 
            justify-content: space-between; align-items: center;
            padding: 15px 20px; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        .logo { font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; }
        .menu-icon { font-size: 1.5rem; cursor: pointer; margin-right: 35px; }

        /* Video Container */
        .feed { height: 100vh; overflow-y: scroll; snap-type: y mandatory; }
        .video-card { 
            height: 100vh; width: 100%; snap-align: start; 
            position: relative; display: flex; justify-content: center; align-items: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlay Info */
        .side-bar {
            position: absolute; right: 15px; bottom: 100px;
            display: flex; flex-direction: column; gap: 20px; align-items: center;
        }
        .side-icon { text-align: center; font-size: 0.8rem; }
        .side-icon i { font-size: 2rem; display: block; margin-bottom: 5px; }

        .bottom-info {
            position: absolute; left: 15px; bottom: 40px; width: 70%;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
        }
        .price-tag { color: #ffcc00; font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .description-preview { 
            font-size: 0.9rem; cursor: pointer; 
            background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px;
        }

        /* Modal (Açıqlama Pəncərəsi) */
        .modal {
            display: none; position: fixed; bottom: 0; width: 100%;
            background: rgba(20, 20, 20, 0.95); border-radius: 20px 20px 0 0;
            padding: 20px; z-index: 200; transition: transform 0.3s ease;
        }
        .modal.active { display: block; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .close-modal { float: right; font-size: 1.5rem; }

        /* Bottom Nav */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; display: flex;
            justify-content: space-around; padding: 15px 0; background: #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">VIDOSMARK</div>
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
    </div>

    <div class="feed" id="videoFeed">
        </div>

    <div class="modal" id="descModal">
        <span class="close-modal" onclick="closeDesc()">&times;</span>
        <h3 id="modalTitle">Məlumat</h3>
        <p id="modalText"></p>
        <hr>
        <button style="width:100%; padding:10px; background:#ffcc00; border:none; border-radius:5px;">İndi Zəng Et</button>
    </div>

    <div class="nav-bar">
        <i class="fas fa-home"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-plus-square" style="font-size: 2rem;"></i>
        <i class="fas fa-heart"></i>
        <i class="fas fa-user"></i>
    </div>

    <script>
        function openDesc(title, text) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalText').innerText = text;
            document.getElementById('descModal').classList.add('active');
        }
        function closeDesc() {
            document.getElementById('descModal').classList.remove('active');
        }
        // Supabase-dən məlumatları çəkib video-card yaradan funksiyanı bura əlavə et
    </script>
</body>
</html>
